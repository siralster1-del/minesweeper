<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minesweeper Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>💣 Minesweeper</h1>
            <div class="game-info">
                <div class="info-item">
                    <span class="label">Mines:</span>
                    <span id="mine-count">10</span>
                </div>
                <div class="info-item">
                    <span class="label">Time:</span>
                    <span id="timer">000</span>
                </div>
                <div class="info-item">
                    <span class="label">Status:</span>
                    <span id="game-status">Ready</span>
                </div>
            </div>
        </header>

        <div class="settings-panel">
            <h3>Game Settings</h3>
            <div class="setting-group">
                <label for="board-size">Board Size:</label>
                <select id="board-size">
                    <option value="9">9x9 (Easy)</option>
                    <option value="16" selected>16x16 (Medium)</option>
                    <option value="20">20x20 (Hard)</option>
                    <option value="custom">Custom</option>
                </select>
            </div>
            <div class="setting-group" id="custom-size-group" style="display: none;">
                <label for="custom-width">Width:</label>
                <input type="number" id="custom-width" min="5" max="30" value="16">
                <label for="custom-height">Height:</label>
                <input type="number" id="custom-height" min="5" max="30" value="16">
            </div>
            <div class="setting-group">
                <label for="mine-count-input">Number of Mines:</label>
                <input type="number" id="mine-count-input" min="1" max="200" value="40">
            </div>
            <button id="new-game-btn" class="btn btn-primary">New Game</button>
        </div>

        <div class="game-container">
            <div id="game-board" class="game-board"></div>
        </div>

        <div class="controls">
            <button id="reset-btn" class="btn btn-secondary">Reset</button>
            <button id="hint-btn" class="btn btn-hint">Hint</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
